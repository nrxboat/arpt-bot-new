# ============================================
# ARPT-Bot Aria2 閰嶇疆
# 鍩轰簬 P3TERX/aria2.conf 鏈€浣冲疄璺?# ============================================

# --- 鍩烘湰璁剧疆 ---
dir=/downloads
log=/config/aria2.log
log-level=notice
console-log-level=notice

# --- RPC 璁剧疆 ---
enable-rpc=true
rpc-secret=112233445566
rpc-listen-all=true
rpc-listen-port=6800
rpc-allow-origin-all=true
rpc-secure=false
rpc-max-request-size=10M

# --- 浠诲姟璁剧疆 ---
continue=true
max-concurrent-downloads=5
max-connection-per-server=16
min-split-size=20M
split=16
max-overall-download-limit=0
max-download-limit=0
max-overall-upload-limit=0
max-upload-limit=0
disable-ipv6=true
check-certificate=false

# --- 杩涘害淇濆瓨 ---
input-file=/config/aria2.session
save-session=/config/aria2.session
save-session-interval=30

# --- 纾佺洏缂撳瓨 ---
disk-cache=64M
file-allocation=falloc

# --- BT/PT 璁剧疆 ---
bt-enable-lpd=true
bt-max-peers=55
bt-tracker-connect-timeout=10
bt-tracker-timeout=10
enable-dht=true
enable-dht6=false
enable-peer-exchange=true
follow-torrent=true
listen-port=6888
dht-listen-port=6888
dht-file-path=/config/dht.dat
dht-file-path6=/config/dht6.dat
peer-id-prefix=-TR2770-
user-agent=Transmission/2.77
seed-ratio=1.0
seed-time=60

# --- 涓嬭浇瀹屾垚鍚庢墽琛?---
# 鐢?bot 閫氳繃 RPC 閫氱煡澶勭悊锛屼笉渚濊禆 on-download-complete 閽╁瓙
on-download-complete=/config/clean.sh
on-download-stop=/config/delete.sh
on-bt-download-complete=/config/clean.sh
on-download-error=/config/delete.sh

# --- 鑷姩娓呯悊 ---
max-download-result=100
auto-file-renaming=true
allow-overwrite=false
content-disposition-default-utf8=true
bt-tracker=
